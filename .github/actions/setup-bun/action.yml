name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
runs:
  using: "composite"
  steps:
    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-v2-${{ hashFiles('**/bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Get Bun download URL
      id: bun-url
      shell: bash
      run: |
        V=$(node -p "require('./package.json').packageManager.split('@')[1]")
        case "$RUNNER_OS" in
          macOS)   OS=darwin ;;
          Linux)   OS=linux ;;
          Windows) OS=windows ;;
        esac
        if [ "$RUNNER_ARCH" = "X64" ]; then
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64.zip" >> "$GITHUB_OUTPUT"
        else
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-arm64.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ !steps.bun-url.outputs.url && 'package.json' || '' }}
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Install dependencies
      run: bun install
      shell: bash
