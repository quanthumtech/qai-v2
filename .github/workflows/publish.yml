name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Install QAI
        if: inputs.bump || inputs.version
        run: bun i -g qaicli

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_BUMP: ${{ inputs.bump }}
          OPENCODE_VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        id: build
        run: |
          ./packages/opencode/script/build.ts --single --skip-arm64
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}

      - uses: actions/upload-artifact@v4
        with:
          name: qaicli
          path: packages/opencode/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          name: qaicli
          path: packages/opencode/dist

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: QAI CLI ${{ needs.version.outputs.version }}
          body: |
            ## QAI CLI v${{ needs.version.outputs.version }}

            Install:
            - Linux/macOS: `curl -fsSL https://raw.githubusercontent.com/quanthumtech/qai-v2/main/install.sh | sh`
            - Windows: `irm 'https://raw.githubusercontent.com/quanthumtech/qai-v2/main/install.ps1' | iex`
          files: |
            packages/opencode/dist/qaicli-linux-x64/bin/qaicli
            packages/opencode/dist/qaicli-linux-x64-musl/bin/qaicli
            packages/opencode/dist/qaicli-macos-x64/bin/qaicli
            packages/opencode/dist/qaicli-macos-arm64/bin/qaicli
            packages/opencode/dist/qaicli-windows-x64/bin/qaicli.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
