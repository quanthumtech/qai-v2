name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - id: version
        run: |
          # Generate version outputs
          VERSION="0.0.0-preview-$(date +%Y%m%d%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "release=" >> $GITHUB_OUTPUT
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli-linux:
    needs: version
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build Linux
        id: build
        run: |
          ./packages/opencode/script/build.ts --single --skip-arm64
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}

      - uses: actions/upload-artifact@v4
        with:
          name: qaicli-linux
          path: packages/opencode/dist
          retention-days: 1

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          name: qaicli-linux
          path: packages/opencode/dist

      - name: List artifacts
        run: |
          ls -la packages/opencode/dist/
          ls -la packages/opencode/dist/qaicli-linux-x64/bin/ 2>/dev/null || echo "bin not found"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: QAI CLI ${{ needs.version.outputs.version }}
          body: |
            ## QAI CLI v${{ needs.version.outputs.version }}

            Install:
            - Linux/macOS: `curl -fsSL https://raw.githubusercontent.com/quanthumtech/qai-v2/master/install.sh | sh`
            - Windows: `irm 'https://raw.githubusercontent.com/quanthumtech/qai-v2/master/install.ps1' | iex`
            - npm: `npm install -g qaicli`
          files: |
            packages/opencode/dist/qaicli-linux-x64/bin/qaicli=qaicli-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --access public
        working-directory: packages/opencode
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
