name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - id: version
        run: |
          # Generate version outputs
          VERSION="0.0.0-preview-$(date +%Y%m%d%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "release=" >> $GITHUB_OUTPUT
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli-linux:
    needs: version
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build Linux
        id: build
        run: |
          ./packages/opencode/script/build.ts --single --skip-arm64
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}

      - uses: actions/upload-artifact@v4
        with:
          name: qaicli-linux
          path: packages/opencode/dist
          retention-days: 1

    outputs:
      version: ${{ needs.version.outputs.version }}

  build-desktop-linux:
    needs: version
    runs-on: ubuntu-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build CLI
        run: |
          ./packages/opencode/script/build.ts --single --skip-arm64
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}

      - name: Copy CLI to sidecar
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          cp packages/opencode/dist/qaicli-linux-x64/bin/qaicli packages/desktop/src-tauri/sidecars/opencode-cli-x86_64-unknown-linux-gnu
          chmod +x packages/desktop/src-tauri/sidecars/opencode-cli-x86_64-unknown-linux-gnu

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Build Desktop
        run: |
          source "$HOME/.cargo/env"
          cd packages/desktop
          bun run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: qaicli-desktop-linux
          path: packages/desktop/src-tauri/target/release/bundle
          retention-days: 1

  build-desktop-windows:
    needs: version
    runs-on: windows-latest
    if: github.repository == 'quanthumtech/qai-v2'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          .\packages\opencode\script\build.ts --single
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}

      - name: Copy CLI to sidecar
        run: |
          mkdir packages\desktop\src-tauri\sidecars
          copy packages\opencode\dist\qaicli-windows-x64\bin\qaicli packages\desktop\src-tauri\sidecars\opencode-cli-x86_64-pc-windows-msvc.exe

      - name: Build Desktop
        run: |
          cd packages\desktop
          bun run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: qaicli-desktop-windows
          path: packages/desktop/src-tauri/target/release/bundle
          retention-days: 1

  publish:
    needs:
      - version
      - build-cli-linux
      - build-desktop-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          name: qaicli-linux
          path: packages/opencode/dist

      - uses: actions/download-artifact@v4
        with:
          name: qaicli-desktop-linux
          path: packages/desktop/dist

      - name: List artifacts
        run: |
          ls -la packages/opencode/dist/
          ls -la packages/opencode/dist/qaicli-linux-x64/bin/ 2>/dev/null || echo "bin not found"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: QAI CLI ${{ needs.version.outputs.version }}
          body: |
            ## QAI CLI v${{ needs.version.outputs.version }}

            Install:
            - Linux/macOS: `curl -fsSL https://raw.githubusercontent.com/quanthumtech/qai-v2/master/install.sh | sh`
            - Windows: `irm 'https://raw.githubusercontent.com/quanthumtech/qai-v2/master/install.ps1' | iex`
            - npm: `npm install -g qaicli`
          files: |
            packages/opencode/dist/qaicli-linux-x64/bin/qaicli
            packages/desktop/dist/deb/qaicli_*.deb
            packages/desktop/dist/rpm/qaicli-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm publish disabled - not working properly
      # To enable: uncomment the following steps
      # - name: Publish to npm
      #   uses: JS-DevTools/npm-publish@v1
      #   with:
      #     package: packages/opencode
      #     access: public
      #     token: ${{ secrets.NPM_TOKEN }}
