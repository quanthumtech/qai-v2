name: qai

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  qai:
    if: |
      contains(github.event.comment.body, ' /qai') ||
      startsWith(github.event.comment.body, '/qai')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install qaicli
        run: curl -fsSL https://raw.githubusercontent.com/quanthumtech/qai-v2/main/install.sh | bash

      - name: Run qaicli
        run: |
          qaicli run "Process this comment: ${{ github.event.comment.body }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
